# ============================================================
# Pipeline CI/CD - EP3 DevOps (Observabilidad y cumplimiento)
# ============================================================
name: CI-CD EP3

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  # ----------------------------------------------------------
  # 1) Pruebas + cobertura
  # ----------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas con cobertura
        run: pytest --cov=app --cov-report=xml --cov-report=term

      - name: Guardar reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  # ----------------------------------------------------------
  # 2) Calidad SonarCloud
  # ----------------------------------------------------------
  calidad:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias y generar cobertura
        run: |
          pip install -r requirements.txt
          pytest --cov=app --cov-report=xml

      - name: Analisis SonarCloud
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Verificar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ----------------------------------------------------------
  # 3) Seguridad dependencias Snyk
  # ----------------------------------------------------------
  seguridad-dependencias:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk - escaneo de dependencias
        uses: snyk/actions/python@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical

  # ----------------------------------------------------------
  # 4) Build Docker + Trivy
  # ----------------------------------------------------------
  build-y-scan:
    needs: [calidad, seguridad-dependencias]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build de la imagen Docker
        run: docker build -t microservicio-ep3:${{ github.sha }} .

      - name: Escaneo de seguridad de la imagen Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: microservicio-ep3:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

  # ----------------------------------------------------------
  # 5) Deploy simulado + push imagen GHCR
  # ----------------------------------------------------------
  deploy:
    needs: build-y-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push de la imagen
        run: |
          INICIO=$(date +%s)
          docker build -t ghcr.io/louima-jeff/microservicio-ep3:latest .
          docker push ghcr.io/louima-jeff/microservicio-ep3:latest
          FIN=$(date +%s)
          echo "DEPLOY_DURATION=$((FIN-INICIO))" >> $GITHUB_ENV

      - name: Desplegar en Kubernetes simulado
        run: |
          echo "kubectl apply -f k8s/"
          # kubectl apply -f k8s/

      - name: Publicar metricas de pipeline a Pushgateway
        run: |
          echo "deploy_duration_seconds ${DEPLOY_DURATION}" | \
            curl --data-binary @- http://PUSHGATEWAY:9091/metrics/job/ci_ep3 || true